<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualization Dashboard - Reference</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 40px; color: #2c3e50; font-size: 2.5rem; font-weight: 300; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; margin-bottom: 30px; }
        .card { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .section { grid-column: 1 / -1; }
        .section h2 { color: #2c3e50; margin-bottom: 20px; font-size: 1.8rem; display: flex; align-items: center; gap: 10px; }
        .chat-container { 
            height: 500px; overflow-y: auto; background: white; border-radius: 16px; padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; 
        }
        .message { margin-bottom: 15px; display: flex; gap: 10px; }
        .message.user { justify-content: flex-end; }
        .message-bubble { 
            max-width: 70%; padding: 15px 20px; border-radius: 20px; 
        }
        .message.user .message-bubble { 
            background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; 
        }
        .message.ai .message-bubble { 
            background: #f8f9fa; border: 1px solid #e9ecef; 
        }
        .chart-container { 
            width: 100%; height: 400px; border-radius: 12px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        .chat-input-container { 
            display: flex; gap: 15px; max-width: 800px; margin: 0 auto; 
        }
        .chat-input-container input { 
            flex: 1; padding: 18px 20px; border: 2px solid #e9ecef; border-radius: 12px; 
            font-size: 1.1rem; outline: none; 
        }
        .chat-input-container input:focus { border-color: #4f46e5; }
        .recent-charts { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; margin-top: 30px; 
        }
        .chart-thumb { 
            border-radius: 12px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); 
            transition: transform 0.3s; cursor: pointer; 
        }
        .chart-thumb:hover { transform: scale(1.02); }
        .controls { margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        .btn { 
            padding: 12px 24px; border: none; border-radius: 10px; font-weight: 600; 
            cursor: pointer; transition: all 0.3s; 
        }
        .btn-primary { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; }
        .btn-secondary { background: white; color: #4f46e5; border: 2px solid #e9ecef; }
        .clear-btn { background: #e74c3c; color: white; }
        @media (max-width: 768px) { .chat-input-container { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 AI Visualization Assistant</h1>
        
        <div class="controls">
            <input type="text" id="queryInput" placeholder="Type: 'bar chart of age vs charges' or 'scatter bmi vs charges'" style="flex: 1; padding: 15px; border: 2px solid #e9ecef; border-radius: 10px;">
            <button onclick="generateChart()" class="btn btn-primary">Generate Chart <i class="fas fa-magic"></i></button>
            <button onclick="clearChat()" class="btn btn-secondary">Clear</button>
        </div>
        
        <div class="chat-container" id="chatContainer"></div>
        
        <div class="recent-charts">
            <h3 style="grid-column: 1 / -1; margin: 30px 0 20px 0; color: #2c3e50;">📈 Recent Charts</h3>
            <div id="recentCharts"></div>
        </div>
    </div>

    <script>
        // Sample columns - replace with real API
        const columns = ['age', 'sex', 'bmi', 'children', 'smoker', 'region', 'charges'];
        
        let chatHistory = [];
        
        async function generateChart() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) return;
            
            addMessage('user', query);
            document.getElementById('queryInput').value = '';
            
            try {
                const response = await fetch('http://localhost:5000/visualize', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        file_id: 'demo', // Use currentDatasetId from main app
                        query: query
                    })
                });
                
                const result = await response.json();
                addChart(result.spec, result.chart);
                chatHistory.push({query, spec: result.spec});
                updateRecentCharts();
            } catch (error) {
                addMessage('ai', 'Error generating chart. Demo shown.', true);
                addDemoChart();
            }
        }
        
        function addMessage(sender, text, isError = false) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `<div class="message-bubble ${isError ? 'error' : ''}">${text}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function addChart(spec, chartHtml) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'message ai';
            div.innerHTML = `
                <div class="message-bubble">
                    <strong>Chart: ${spec.chart_type} (${spec.x_column}${spec.y_column ? ' vs ' + spec.y_column : ''})</strong>
                    <div class="chart-container" id="chart-${Date.now()}"></div>
                    <details style="margin-top: 10px;">
                        <summary>Chart Spec</summary>
                        <pre>${JSON.stringify(spec, null, 2)}</pre>
                    </details>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            
            // Render Plotly chart
            const chartDiv = document.getElementById(`chart-${div.querySelector('.chart-container').id.split('-')[1]}`);
            chartDiv.outerHTML = chartHtml;
        }
        
        function addDemoChart() {
            const demoHtml = `
                <div class="chart-container">
                    <iframe src="https://plotly.com/~empet/14714.embed" 
                            style="border: none; width:100%; height:400px;"></iframe>
                </div>
            `;
            addMessage('ai', 'Demo chart - connect to backend for real data', true);
        }
        
        function updateRecentCharts() {
            const container = document.getElementById('recentCharts');
            container.innerHTML = chatHistory.slice(-4).reverse().map((h, i) => `
                <div class="chart-thumb">
                    <div style="padding:15px; background:#f8f9fa;">
                        <strong>${h.query.substring(0,50)}...</strong>
                        <div style="font-size:0.9rem; color:#666; margin-top:5px;">
                            ${h.spec.chart_type} • ${h.spec.x_column}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function clearChat() {
            document.getElementById('chatContainer').innerHTML = '';
            chatHistory = [];
            updateRecentCharts();
            showToast('Chat cleared!', 'success');
        }
        
        // Enter key support
        document.getElementById('queryInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') generateChart();
        });
        
        // Toast helper
        function showToast(msg, type = 'info') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; top: 20px; right: 20px; background: ${type==='success' ? '#27ae60' : '#3498db'}; 
                color: white; padding: 15px 20px; border-radius: 8px; z-index: 1000; 
                transform: translateX(300px); transition: transform 0.3s;
            `;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.transform = 'translateX(0)', 100);
            setTimeout(() => {
                toast.style.transform = 'translateX(300px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
